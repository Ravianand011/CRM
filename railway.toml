# Monorepo: CRM frontend + webhook-server. This service runs the Facebook webhook API only.
# If you deploy the Vite CRM as a separate Railway service, set that service's root to "/" with its own config.

[build]
builder = "nixpacks"
buildCommand = "npm install --prefix webhook-server"

[deploy]
# Works when Root Directory is "/" (repo root)
startCommand = "npm start --prefix webhook-server"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
